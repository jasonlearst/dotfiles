{{- /*
  Map Go-style arch (.chezmoi.arch) to the Rust target triples used by most
  release artifacts (eza, zellij, jj, mcfly, tere). amd64 -> x86_64,
  arm64 -> aarch64.
*/ -}}
{{- $rustArch := dict "amd64" "x86_64" "arm64" "aarch64" -}}
{{- $a := index $rustArch .chezmoi.arch -}}
[".tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm"
    refreshPeriod = "168h"
[".vim/autoload/plug.vim"]
    type = "file"
    url = "https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim"
    refreshPeriod = "168h"
{{- if eq .chezmoi.os "linux" }}
[".local/bin/eza"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "eza-community/eza" (printf "eza_%s-unknown-linux-gnu.tar.gz" $a) | quote }}
    executable = true
    path = "./eza"
[".local/bin/zellij"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "zellij-org/zellij" (printf "zellij-%s-unknown-linux-musl.tar.gz" $a) | quote }}
    executable = true
    path = "zellij"
[".local/bin/jump"]
   type = "file"
   url = {{ gitHubLatestReleaseAssetURL "gsamokovarov/jump" (printf "jump_%s_%s_binary" .chezmoi.os .chezmoi.arch) | quote }}
   executable = true
[".local/bin/fzf"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "junegunn/fzf" (printf "fzf-*-%s_%s.tar.gz" .chezmoi.os .chezmoi.arch) | quote }}
    executable = true
    path = "fzf"
[".local/bin/jj"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "jj-vcs/jj" (printf "jj-*-%s-unknown-%s-musl.tar.gz" $a .chezmoi.os) | quote }}
    executable = true
    path = "./jj"
[".local/bin/mcfly"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "cantino/mcfly" (printf "mcfly-*-%s-unknown-%s-musl.tar.gz" $a .chezmoi.os) | quote }}
    executable = true
    path = "mcfly"
[".local/bin/tere"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "mgunyho/tere" (printf "tere-*-%s-unknown-%s-musl.zip" $a .chezmoi.os) | quote }}
    executable = true
    path = "tere"
[".local/bin/zoxide"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "ajeetdsouza/zoxide" (printf "zoxide-*-%s-unknown-%s-musl.tar.gz" $a .chezmoi.os) | quote }}
    executable = true
    path = "zoxide"
{{- end -}}
